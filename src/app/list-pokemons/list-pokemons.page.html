<ion-content [fullscreen]="true">
  <ion-grid>
    @for(pokemon of pokemons; track pokemon){
      <ion-card (click)="goToPage(pokemon)">
        <ion-card-content>
          <ion-row class="ion-align-items-center">
            <ion-col size="3">
              <ion-img [src]="pokemon.sprite" alt="{{ pokemon.name }}"></ion-img>
            </ion-col>
            <ion-col size="9">
              <ion-text class="ion-text-capitalize">{{ pokemon.name }}</ion-text>
            </ion-col>
          </ion-row>
        </ion-card-content>
      </ion-card>
    }
  </ion-grid>

  <ion-infinite-scroll threshold="50px" (ionInfinite)="getMorePokemons($event)">
    <ion-infinite-scroll-content
      loadingText="Cargando..."
      loadingSpinner="bubbles">
    </ion-infinite-scroll-content>
  </ion-infinite-scroll>
</ion-content>
